#app{max-width:480px;margin:0 auto;min-height:100vh;background:#fff}

let curUser = null, curBook = null, curSec = null;
const revealed = new Set();

function showLogin(errMsg) {
  setApp(`
    <div class="pg-login">
      <div class="login-hero">
        <span class="login-em">😄</span>
        <div class="login-title">Смях с децата</div>
        <div class="login-sub">Пътеводител за хубаво време</div>
      </div>
      <div class="login-body">
        <label class="login-label">Имейл адрес</label>
        <input class="login-input" type="email" id="em" placeholder="твоя@имейл.com" autocomplete="email" inputmode="email"/>
        <div class="login-err${errMsg?' show':''}" id="lerr">${errMsg||''}</div>
        <button class="login-btn" id="lbtn">Влез в приложението →</button>
        <p class="login-note">Въведи имейла, с който сте закупили книгата.<br>При покупка получаваш линк за автоматично влизане.</p>
      </div>
    </div>
  `);
  document.getElementById('lbtn').addEventListener('click', handleLogin);
  document.getElementById('em').addEventListener('keydown', e => { if(e.key==='Enter') handleLogin(); });
}

function handleLogin() {
  const email = (document.getElementById('em').value||'').trim().toLowerCase();
  const errEl = document.getElementById('lerr');
  if(!email || !email.includes('@')) { showErr(errEl,'Моля въведи валиден имейл.'); return; }
  curUser = email;
  localStorage.setItem('smyah_user', email);
  showHome();
}

function showHome() {
  curBook=null; curSec=null; revealed.clear();
  const email = curUser || '';
  const short = email.length>22 ? email.slice(0,19)+'...' : email;
  setApp(`
    <div>
      <div class="home-hdr">
        <div><h1>Смях с децата</h1><p>Пътеводител за хубаво време</p></div>
        <div style="text-align:right">
          <span style="font-size:30px">😄</span>
          <button class="logout-btn" id="lout">Изход</button>
        </div>
      </div>
      <div class="home-body">
        <div class="all-chip">✨ Всички книги — пълен достъп</div>
        <div class="section-label">Избери книга</div>
        <div class="books-grid" id="bgrid"></div>
        <div style="text-align:center;margin-top:14px;font-size:11px;color:#ddd">${short}</div>
      </div>
    </div>
  `);
  document.getElementById('lout').addEventListener('click', () => { localStorage.removeItem('smyah_user'); curUser=null; showLogin(); });
  const grid = document.getElementById('bgrid');
  grid.innerHTML = BOOKS.map(b => `
    <div class="book-card" data-bid="${b.id}">
      <div class="book-cover" style="background:${b.color}">
        <span class="part-badge">${b.part}</span>
        <span class="cover-em">${b.emoji}</span>
        <div class="cover-cnt">${b.subtitle.split(' ')[0]}</div>
        <div class="cover-sub">${b.subtitle.split(' ').slice(1).join(' ')}</div>
      </div>
      <div class="book-footer">
        <div class="bf-title">Смях с децата</div>
        <div class="bf-meta">${b.age} · ${b.pages}</div>
      </div>
    </div>
  `).join('');
  grid.addEventListener('click', e => {
    const c = e.target.closest('[data-bid]');
    if(c) showContents(parseInt(c.dataset.bid));
  });
}

function showContents(bookId) {
  curBook = BOOKS.find(b => b.id === bookId);
  curSec = null; revealed.clear();
  setApp(`
    <div>
      <div class="topbar">
        <button class="btn-back" id="back">←</button>
        <span class="topbar-title">${curBook.part} — Съдържание</span>
      </div>
      <div class="book-banner" style="background:${curBook.color}">
        <span class="banner-em">${curBook.emoji}</span>
        <div class="banner-text"><h2>Смях с децата</h2><p>${curBook.subtitle}</p></div>
      </div>
      <div class="contents-body" id="slist"></div>
    </div>
  `);
  document.getElementById('back').addEventListener('click', showHome);
  const list = document.getElementById('slist');
  list.innerHTML = curBook.sections.map((s,i) => `
    <div class="sec-item" data-si="${i}">
      <div class="sec-icon" style="background:${curBook.color}22">${s.icon}</div>
      <div class="sec-body">
        <div class="sec-title">${s.title}</div>
        <div class="sec-count">${s.items.length} ${s.type==='qa'?'въпроса с отговори':'предизвикателства'}</div>
      </div>
      <span class="sec-arr">›</span>
    </div>
  `).join('');
  list.addEventListener('click', e => {
    const item = e.target.closest('[data-si]');
    if(item) showReader(parseInt(item.dataset.si));
  });
}

function showReader(idx) {
  curSec = idx; revealed.clear();
  const s = curBook.sections[idx];
  const col = curBook.color;
  const tip = s.type==='qa' ? '👆 Натисни картата за да видиш отговора' : '🎮 Отговаряйте по ред — кой ще се сети пръв?';
  setApp(`
    <div class="reader-bg">
      <div class="topbar">
        <button class="btn-back" id="back">←</button>
        <span class="topbar-title">${s.title}</span>
      </div>
      <div class="reader-sec-hdr">
        <div class="r-icon" style="background:${col}22">${s.icon}</div>
        <div class="r-info"><h3>${s.title}</h3><p>${curBook.part} · ${s.items.length} ${s.type==='qa'?'въпроса':'предизвикателства'}</p></div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="pf" style="background:${col};width:0%"></div></div>
      <div class="reader-body">
        <div class="reader-tip">${tip}</div>
        <div id="cards"></div>
        <div class="reader-done" id="rdone"></div>
      </div>
    </div>
  `);
  document.getElementById('back').addEventListener('click', () => showContents(curBook.id));
  renderCards();
}

function renderCards() {
  const s = curBook.sections[curSec];
  const col = curBook.color;
  const cards = document.getElementById('cards');
  if(!cards) return;
  cards.innerHTML = s.items.map((item, i) => {
    if(s.type === 'qa') {
      const done = revealed.has(i);
      return `<div class="qa-card">
        <div class="qa-num">№ ${i+1}</div>
        <div class="qa-q">${item.q}</div>
        ${item.a
          ? `<button class="qa-btn${done?' rev':''}" data-qi="${i}">${done?'✅ '+item.a:'🔒 Покажи отговора'}</button>`
          : '<div style="font-size:11px;color:#ccc;font-style:italic">Тази е чисто за смях!</div>'
        }
      </div>`;
    }
    return `<div class="list-card">
      <div class="list-num" style="background:${col}22;color:${col}">${i+1}</div>
      <div class="list-txt">${item.q}</div>
    </div>`;
  }).join('');
  cards.addEventListener('click', e => {
    const btn = e.target.closest('[data-qi]');
    if(!btn || btn.classList.contains('rev')) return;
    const i = parseInt(btn.dataset.qi);
    revealed.add(i);
    btn.classList.add('rev');
    btn.textContent = '✅ ' + curBook.sections[curSec].items[i].a;
    updateProgress();
  });
  updateProgress();
}

function updateProgress() {
  const s = curBook.sections[curSec];
  const qa = s.items.filter(x => x.a);
  if(!qa.length) return;
  let cnt = 0;
  s.items.forEach((_,i) => { if(revealed.has(i)) cnt++; });
  const pct = Math.round(cnt / qa.length * 100);
  const pf = document.getElementById('pf');
  const done = document.getElementById('rdone');
  if(pf) pf.style.width = pct+'%';
  if(done) done.textContent = pct===100 ? '🎉 Браво! Разкри всички отговори!' : cnt+' от '+qa.length+' разкрити';
}

function setApp(html) { document.getElementById('app').innerHTML=html; window.scrollTo(0,0); }
function showErr(el,msg) { if(el){el.textContent=msg;el.classList.add('show');} }

  curUser = savedEmail;
  showHome();
} else {
  showLogin();
}
</script>
